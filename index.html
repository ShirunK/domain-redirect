<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=https://tangshi.run">
    <script>
        var targetDomain = "https://tangshi.run";
        var currentPath = window.location.pathname + window.location.search + window.location.hash;
        window.location.replace(targetDomain + currentPath);
    </script>
</head>

        ... <br><br>

</body>
</html>
